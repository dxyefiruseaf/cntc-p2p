name: Sync Market Data to Supabase

on:
  workflow_dispatch:
  schedule:
    # Chạy mỗi giờ. GitHub Actions dùng UTC.
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync market data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_URL: ${{ vars.PUBLIC_DATA_API_URL || 'https://btc-bigdata-is55a.onrender.com' }}
          SYNC_SOURCE: ${{ vars.SYNC_SOURCE || 'binance' }}
          SYNC_HOURS: ${{ vars.SYNC_HOURS || '720' }}
          BINANCE_API_BASE: ${{ vars.BINANCE_API_BASE || 'https://data-api.binance.vision' }}
          SYNC_P2P_FROM_BINANCE: ${{ vars.SYNC_P2P_FROM_BINANCE || 'true' }}
          SYNC_P2P_PUBLIC_FALLBACK: ${{ vars.SYNC_P2P_PUBLIC_FALLBACK || 'true' }}
          FALLBACK_USD_VND_RATE: ${{ vars.FALLBACK_USD_VND_RATE || '26000' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || 'BTC BigData Alert <onboarding@resend.dev>' }}
          ALERT_COOLDOWN_HOURS: ${{ vars.ALERT_COOLDOWN_HOURS || '6' }}
        run: python scripts/sync_market_data.py
